name: Build Pages

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-0 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libx11-6 libxcomposite1 libxdamage1 libxext6 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium # 只安装 Chromium

      - name: Build project
        run: npm run generate

      - name: Deploy to pages-keil branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: pages
          folder: .output/public/
