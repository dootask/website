services:

  dootask-site:
    image: ghcr.io/dootask/website/web:latest
    container_name: dootask-site
    ports:
      - "8080:3000"
    volumes:
      - ./uploads:/app/storage/uploads
    environment:
      - NUXT_UPLOAD_TOKEN=${UPLOAD_TOKEN}
      - NUXT_PRIVACY_REDIRECT_URL=${PRIVACY_REDIRECT_URL}
    restart: unless-stopped
