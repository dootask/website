server {
    listen 80;

    server_name www.dootask.com dootask.com;
    root /var/www/public;
 
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;

    client_max_body_size  1024M;

    autoindex off;
    index index.html index.htm index.php;

    charset utf-8;

    location /.well-known/acme-challenge/ {
        root /var/www/public;
    }

    location /site/ {
        rewrite ^/site/(.*).html$ /$1 permanent;
    }

    location = /privacy.html {
        proxy_pass http://127.0.0.1/zh/privacy/;
    }

    location /uploads {
        proxy_pass https://demo.dootask.com/uploads;
    }

    location /desktop {
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass https://demo.dootask.com/desktop;
    }

    # 匹配 /help 路由，代理到 Nuxt 应用
    location /help {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://dootask-site:3000;
    }

    location /manage/dashboard {
        return 301 http://demo.dootask.com/manage/dashboard;
    }

    location /login {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1;
    }

    location /docs {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1;
    }

    location /api {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /var/www/public;
        internal;
    }
}